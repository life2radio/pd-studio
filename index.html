<!DOCTYPE html>
<!--
  PD 스튜디오 — GitHub Pages PWA 페이지
  앱 URL이 바뀌면 아래 TARGET_URL 한 줄만 갱신.
  사용자가 "홈 화면에 추가"로 설치하면, 폰 홈 아이콘 클릭 → 이 페이지 → 자동 리다이렉트 → 앱 실행.
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>나도 PD 있다 · PD 스튜디오</title>
  <meta name="description" content="1인 콘텐츠 창작자를 위한 무료 AI 도구. 파고드림 제작.">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#B85C38">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PD 스튜디오">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

  <!-- OG / 공유용 -->
  <meta property="og:title" content="나도 PD 있다 · PD 스튜디오">
  <meta property="og:description" content="PD가 당신을 인터뷰하고, 영상 한 편 분량의 모든 결과물을 만들어드려요. 1인 콘텐츠 창작자를 위한 무료 AI 도구.">
  <meta property="og:image" content="icon-512.png">
  <meta property="og:type" content="website">

  <!-- ↓↓↓ 앱 업데이트로 URL 바뀌면 이 한 줄만 수정 ↓↓↓ -->
  <script>const TARGET_URL = 'https://claude.ai/public/artifacts/b2fbe316-4c45-4005-ae7c-19d003095f55';</script>
  <!-- ↑↑↑ 앱 업데이트로 URL 바뀌면 이 한 줄만 수정 ↑↑↑ -->

  <script>
    // 스탠드얼론 모드(PWA로 설치 후 실행)면 즉시 앱으로
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;
    if (isStandalone) {
      window.location.replace(TARGET_URL);
    } else {
      // 일반 웹 진입: URL에 ?go 또는 referrer 기반 즉시 이동
      // 1회 방문자에겐 설치 권유, 재방문자는 즉시 이동
      const params = new URLSearchParams(window.location.search);
      const skipPrompt = params.has('go') || sessionStorage.getItem('pd-skip-prompt');
      if (skipPrompt) {
        window.location.replace(TARGET_URL);
      }
      // 그 외엔 페이지 보여주고 사용자가 버튼 선택
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #FAF5EA 0%, #F0E4CC 100%);
      color: #2A1810;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      line-height: 1.6;
    }
    .box {
      max-width: 420px;
      width: 100%;
      background: white;
      border-radius: 1.2rem;
      box-shadow: 0 8px 24px rgba(184, 92, 56, 0.12), 0 2px 6px rgba(0,0,0,0.04);
      padding: 1.8rem 1.5rem 1.5rem;
      text-align: center;
    }
    .icon {
      width: 88px; height: 88px;
      margin: 0 auto 0.8rem;
      border-radius: 1.2rem;
      box-shadow: 0 4px 12px rgba(184, 92, 56, 0.25);
    }
    h1 {
      font-size: 1.25rem;
      color: #B85C38;
      margin: 0 0 0.3rem;
      font-weight: 800;
    }
    .tagline {
      font-size: 0.85rem;
      color: #5C4A3A;
      margin: 0 0 1.3rem;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 0.6rem;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      border: 0;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background: #B85C38;
      color: white;
      box-shadow: 0 2px 8px rgba(184, 92, 56, 0.3);
    }
    .btn-primary:hover { background: #a04f2e; }
    .btn-secondary {
      background: transparent;
      color: #5C4A3A;
      border: 1px solid rgba(92, 74, 58, 0.25);
      margin-top: 0.5rem;
      font-weight: 600;
    }
    .btn-install {
      background: rgba(245, 181, 0, 0.15);
      color: #7a5818;
      border: 1px solid rgba(245, 181, 0, 0.4);
      margin-top: 0.5rem;
      display: none;
    }
    .btn-install.show { display: block; }
    .install-hint {
      margin-top: 1rem;
      padding: 0.7rem 0.8rem;
      background: rgba(245, 181, 0, 0.08);
      border: 1px solid rgba(245, 181, 0, 0.25);
      border-radius: 0.55rem;
      font-size: 0.78rem;
      color: #7a5818;
      line-height: 1.55;
      text-align: left;
    }
    .install-hint strong { font-weight: 700; }
    .install-hint .row { margin-bottom: 0.3rem; }
    .install-hint .row:last-child { margin-bottom: 0; }
    .spin {
      width: 24px; height: 24px;
      border: 2.5px solid rgba(184,92,56,0.2);
      border-top-color: #B85C38;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .credit {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #8a7560;
    }
    .credit a {
      color: #B85C38;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <img src="icon-192.png" class="icon" alt="PD 스튜디오 아이콘">
    <h1>🎙 PD 스튜디오</h1>
    <p class="tagline">1인 콘텐츠 창작자를 위한 무료 AI 도구</p>

    <a class="btn btn-primary" id="goApp" href="#">🚀 앱 바로 시작</a>
    <button class="btn btn-install" id="installBtn">📱 홈 화면에 설치 (한 번만)</button>
    <button class="btn btn-secondary" id="hideTip">설치 안내 닫기</button>

    <div class="install-hint" id="installHint">
      <div class="row" style="font-weight:700;color:#7a5818;margin-bottom:0.5rem;">📱 홈 화면에 추가하면 매번 검색 안 해도 돼요</div>
      <div class="row">💻 <strong>PC 크롬</strong>: 주소창 오른쪽 ⊕ 아이콘 → "설치"</div>
      <div class="row">📱 <strong>안드로이드 크롬</strong>: ⋮ → "홈 화면에 추가"</div>
      <div class="row">🍎 <strong>iOS Safari</strong>: 공유 → "홈 화면에 추가"</div>
    </div>

    <div class="credit">
      🎙 <a href="https://www.youtube.com/@pagodream" target="_blank" rel="noopener">파고드림 채널</a> 제작
    </div>
  </div>

  <script>
    // 앱 바로 시작 링크
    document.getElementById('goApp').href = TARGET_URL;
    document.getElementById('goApp').onclick = (e) => {
      sessionStorage.setItem('pd-skip-prompt', '1');
    };

    // 설치 안내 닫기
    document.getElementById('hideTip').onclick = () => {
      sessionStorage.setItem('pd-skip-prompt', '1');
      window.location.replace(TARGET_URL);
    };

    // beforeinstallprompt — 안드로이드 크롬에서 자동 설치 프롬프트 가능
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').classList.add('show');
    });

    document.getElementById('installBtn').onclick = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        // 설치됨 — 곧 앱으로 이동
        sessionStorage.setItem('pd-skip-prompt', '1');
        setTimeout(() => window.location.replace(TARGET_URL), 800);
      }
      deferredPrompt = null;
    };

    // 설치 완료 이벤트
    window.addEventListener('appinstalled', () => {
      sessionStorage.setItem('pd-skip-prompt', '1');
    });
  </script>
</body>
</html>
