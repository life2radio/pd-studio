/* ─── API ────────────────────────────────────────────────── */
async function callClaude(history, maxTokens = 1024) {
  const apiKey = lsGetStr(KEY_API);
  if (!apiKey) throw new Error('API 키가 설정되지 않았어요. 우상단 ⚙ 설정에서 등록해주세요.');
  const model = lsGetStr(KEY_MODEL) || DEFAULT_MODEL;
  let res;
  try {
    res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model,
        max_tokens: maxTokens,
        messages: history
      })
    });
  } catch (e) {
    throw new Error(`네트워크 실패: ${e.message || e}`);
  }
  const raw = await res.text().catch(() => '');
  if (!res.ok) {
    if (res.status === 401) throw new Error('API 키가 잘못됐어요. 설정에서 다시 입력해주세요.');
    if (res.status === 429) throw new Error('요청 한도 초과. 잠시 후 다시 시도하세요.');
    if (res.status === 404) throw new Error(`모델을 찾을 수 없어요 (${model}). 설정에서 다른 모델을 선택해주세요.`);
    throw new Error(`HTTP ${res.status} | ${raw.slice(0, 300)}`);
  }
  let data;
  try {
    data = JSON.parse(raw);
  } catch {
    throw new Error(`응답 파싱 실패 | ${raw.slice(0, 200)}`);
  }
  if (!data || !Array.isArray(data.content)) throw new Error(`응답 형식 이상 | ${JSON.stringify(data).slice(0, 200)}`);
  return data.content.map(c => c.text || '').join('').trim();
}
